<style>

body{

.claimed{

<body>

<div class="container">

<div id="loginSection">

<!-- Alarm is generated via Web Audio API (no external file, works on iOS) -->

<script>

const firebaseConfig = {

apiKey: "AIzaSyDOJRkBNomOOQYB3GiTHZQ61k_Z_yavpso",
authDomain: "srmapintramobility.firebaseapp.com",
databaseURL: "https://srmapintramobility-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "srmapintramobility",
storageBucket: "srmapintramobility.firebasestorage.app",
messagingSenderId: "27384147111",
appId: "1:27384147111:web:26d6ddad4d6b5c14093f82"

};

if (!firebase.apps.length) {

firebase.initializeApp(firebaseConfig);

}



if('serviceWorker' in navigator){

navigator.serviceWorker
.register('service-worker.js');

}



function isServiceAvailable(){

/* Service window removed - always available */
return true;

}

function showServiceClosedMessage(){

document.getElementById("loginStatus")
.innerText =

"Buggy service available only between 11:30 AM and 4:00 PM";

}


async function sha256(message){

const msgBuffer =
new TextEncoder().encode(message);

const hashBuffer =
await crypto.subtle.digest(
'SHA-256',
msgBuffer
);

const hashArray =
Array.from(
new Uint8Array(hashBuffer)
);

const hashHex =
hashArray
.map(b =>
b.toString(16).padStart(2,'0')
)
.join('');

return hashHex;

}

let currentBuggy = null;

function normalizeBuggyId(buggyId){

return String(buggyId || "").trim().toLowerCase();

}


let audioCtx = null;
let beepTimer = null;
let alarmActive = false;

/* Must be called from a user gesture (Login tap) to unlock audio */
function unlockAudio(){

try{

if(!audioCtx){
audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();
}

if(audioCtx.state === "suspended"){
audioCtx.resume();
}

}
catch(e){
console.error("Audio unlock failed:", e);
}

}

function playBeep(){

if(!audioCtx){
return;
}

const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.type = "square";
osc.frequency.value = 880;

gain.gain.value = 0.25;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + 0.25);

}

function startAlarm(){

if(alarmActive){
return;
}

alarmActive = true;

unlockAudio();

playBeep();

beepTimer =
setInterval(playBeep, 900);

}

function stopAlarm(){

alarmActive = false;

if(beepTimer){
clearInterval(beepTimer);
beepTimer = null;
}

}

/* Fallback: unlock audio on the first interaction anywhere
   (covers auto-login / restored sessions with no Login tap) */
function firstTouchUnlock(){

unlockAudio();

document.removeEventListener("pointerdown", firstTouchUnlock);
document.removeEventListener("touchstart", firstTouchUnlock);
document.removeEventListener("click", firstTouchUnlock);

}

document.addEventListener("pointerdown", firstTouchUnlock);
document.addEventListener("touchstart", firstTouchUnlock);
document.addEventListener("click", firstTouchUnlock);


let selectedBuggy = null;

const DRIVER_TIMEOUT = 40000;

const buggyIcon=L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/744/744465.png",

iconSize:[38,38],
iconAnchor:[19,19]

});

const blockLocations={

ADMIN:[16.4645,80.5080],
X_LAB:[16.4636,80.5071],
SR_BLOCK_ENTRANCE:[16.4631,80.5067],
STUDENT_COUNCIL:[16.4625,80.5069],
CV_RAMAN:[16.4620,80.5063],
GATE3:[16.4601,80.5070],
GATE6:[16.4598,80.5049]

};

let driverMap;
let buggyMarkers={};

window.onload = function(){

if(!isServiceAvailable()){

showServiceClosedMessage();

return;

}

firebase.auth().onAuthStateChanged(function(user){

const savedAuth =
localStorage.getItem("driverAuthenticated");

if(user && savedAuth === "true"){

const email = user.email || "";
const buggyId = normalizeBuggyId(email.split("@")[0]);

currentBuggy = buggyId;

localStorage.setItem(
"driverBuggy",
buggyId
);

localStorage.setItem(
"driverAuthenticated",
"true"
);

document.getElementById("loginSection")
.style.display = "none";

document.getElementById("driverPanel")
.style.display = "block";

document.getElementById("driverName")
.innerText = currentBuggy.toUpperCase();

initializeMap();

startSharing();

listenDemand();

listenBuggies();

}

});

};

function selectBuggy(event,buggyId){

selectedBuggy = buggyId;

document
.querySelectorAll(".buggySelectBtn")
.forEach(btn=>{

btn.classList.remove("selectedBuggy");

});

event.target.classList.add("selectedBuggy");

document.getElementById(
"selectedBuggyText"
).innerText =

"Selected: " +
buggyId.toUpperCase();

const loginBtn =
document.getElementById(
"driverLoginBtn"
);

loginBtn.disabled = false;
loginBtn.style.opacity = 1;

}

async function authenticate(){

/* Unlock audio while we are still inside the Login tap gesture */
unlockAudio();

if(!isServiceAvailable()){

showServiceClosedMessage();

return;

}

const buggyId = normalizeBuggyId(selectedBuggy);

const pin =
document.getElementById("pinInput")
.value
.trim();

if(!selectedBuggy || !pin){

document.getElementById("loginStatus")
.innerText = "Select buggy and enter PIN";

return;

}

const email = buggyId + "@mobility.local";
const password = "SRM@" + pin;

document.getElementById("loginStatus")
.innerText = "Checking credentials...";

firebase.auth()
.signInWithEmailAndPassword(email,password)
.then(function(){

firebase.database()
.ref("drivers/" + buggyId)
.once("value")
.then(driverSnap=>{

const driverData = driverSnap.val();

if(driverData && driverData.time){

const age =
Date.now() - driverData.time;

if(age < DRIVER_TIMEOUT){

document.getElementById("loginStatus")
.innerText =
"⚠️ Driver already active on another device";

firebase.auth().signOut();

return;

}

}

currentBuggy = buggyId;

localStorage.setItem(
"driverBuggy",
buggyId
);

localStorage.setItem(
"driverAuthenticated",
"true"
);

document.getElementById("loginSection")
.style.display = "none";

document.getElementById("driverPanel")
.style.display = "block";

document.getElementById("driverName")
.innerText = currentBuggy.toUpperCase();

initializeMap();

startSharing();

listenDemand();

listenBuggies();

});

})
.catch(error=>{

console.error(error);

document.getElementById("loginStatus")
.innerText = "Invalid Buggy or PIN";

});

}

function logoutDriver(){

if(heartbeatTimer){
clearInterval(heartbeatTimer);
heartbeatTimer = null;
}

if(watchId !== null && navigator.geolocation){
navigator.geolocation.clearWatch(watchId);
watchId = null;
}

if(currentBuggy){

firebase.database()
.ref("drivers/" + normalizeBuggyId(currentBuggy))
.remove();

}

firebase.auth().signOut().then(function(){

localStorage.removeItem("driverBuggy");
localStorage.removeItem("driverAuthenticated");

window.location.reload();

}).catch(function(error){

console.error("Logout error:",error);

localStorage.removeItem("driverBuggy");
localStorage.removeItem("driverAuthenticated");

window.location.reload();

});

}

function initializeMap(){

driverMap=L.map('driverMap')
.setView([16.4632,80.5069],16);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(driverMap);

}


let lastLat = null;
let lastLng = null;
let watchId = null;
let heartbeatTimer = null;

/* Write the last known position with a fresh timestamp.
   Skips while the page is hidden (minimised/backgrounded) so the
   driver naturally goes offline only when the app is not in front. */
function pushDriverLocation(){

if(!currentBuggy){
return;
}

if(lastLat === null || lastLng === null){
return;
}

if(document.hidden){
return;
}

firebase.database()
.ref("drivers/" + normalizeBuggyId(currentBuggy))
.set({

lat:lastLat,
lng:lastLng,
time:Date.now()

})
.then(function(){

document.getElementById("status").innerText =
"✅ Online and sharing location";

})
.catch(function(error){

console.error("Driver location write failed:", error);

document.getElementById("status").innerText =
"❌ Location not saved to Firebase: " + error.message;

});

}

function startSharing(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(pos){

lastLat = pos.coords.latitude;
lastLng = pos.coords.longitude;

pushDriverLocation();

},

function(err){

console.error("Initial GPS fetch failed:", err);

if(err.code === err.PERMISSION_DENIED){

document.getElementById("status").innerText =
"⚠️ Location permission denied. Please allow location.";

}
else{

document.getElementById("status").innerText =
"⚠️ Waiting for GPS location...";

}

},

{
enableHighAccuracy:true,
timeout:15000,
maximumAge:0
}

);

}

/* Track GPS changes (this fires ONLY when the location moves) */

if(navigator.geolocation){

watchId = navigator.geolocation.watchPosition(

function(pos){

lastLat = pos.coords.latitude;
lastLng = pos.coords.longitude;

pushDriverLocation();

},

function(err){

/* Ignore TIMEOUT (normal when standing still);
   warn only for real problems */

if(err.code === err.PERMISSION_DENIED){

document.getElementById("status").innerText =
"⚠️ Location permission denied. Please allow location.";

}
else if(err.code === err.POSITION_UNAVAILABLE){

document.getElementById("status").innerText =
"⚠️ Location unavailable. Check GPS.";

}

},

{
enableHighAccuracy:true,
maximumAge:10000
}

);

}

/* Heartbeat: keeps the driver ONLINE while the app is open and in
   the foreground, even when standing still and not touching the
   screen. watchPosition alone does not fire when stationary, which
   is why an idle driver used to drop offline. */

if(!heartbeatTimer){

heartbeatTimer =
setInterval(pushDriverLocation, 8000);

}

}

/* When the app comes back to the foreground, refresh immediately
   so the driver reappears as online without waiting for a beat. */

document.addEventListener("visibilitychange", function(){

if(!document.hidden){

pushDriverLocation();

}

});

function listenBuggies(){

firebase.database()
.ref("drivers")
.on("value",snap=>{

Object.values(buggyMarkers)
.forEach(m=>driverMap.removeLayer(m));

buggyMarkers={};

snap.forEach(child=>{

let d=child.val();

if(!d) return;

const age=Date.now()-d.time;

if(age>30000){

return;

}

buggyMarkers[child.key]=L.marker(
[d.lat,d.lng],
{icon:buggyIcon}
).addTo(driverMap);

});

});

}

function listenDemand(){

firebase.database()
.ref("requests")
.on("value",snap=>{

let arr=[];

let unclaimedExists=false;

Object.keys(blockLocations).forEach(b=>{

arr.push({
block:b,
count:0,
assignedTo:null,
locationVerified:false,
locationVerifiedAt:null,
lastFacultyId:null,
distanceM:null
});

});

snap.forEach(child=>{

let d=child.val()||{};

let item=arr.find(x=>x.block===child.key);

if(item){

item.count=d.count||0;
item.assignedTo=d.assignedTo||null;
item.locationVerified=d.locationVerified===true || d.readyConfirmed===true;
item.locationVerifiedAt=d.locationVerifiedAt||d.readyConfirmedAt||null;
item.lastFacultyId=d.lastFacultyId||d.facultyId||null;
item.distanceM=d.locationValidation && typeof d.locationValidation.distanceM === "number" ? Math.round(d.locationValidation.distanceM) : null;

}

if(
(d.count||0)>0 &&
!d.assignedTo
){
unclaimedExists=true;
}

});

if(unclaimedExists){

startAlarm();

}else{

stopAlarm();

}

arr.sort((a,b)=>b.count-a.count);

document.getElementById("demandList").innerHTML="";

arr.forEach(item=>{

if(item.count<=0) return;

const row=document.createElement("div");

if(item.assignedTo){

row.className="block claimed";

}else{

row.className="block";

}

row.innerHTML=`

<div style="display:flex;align-items:center;gap:8px;width:100%;justify-content:space-between;flex-wrap:wrap;">

<span class="location">
${item.block.replaceAll("_"," ")}
</span>

<span class="count">
${item.count}
</span>

<div class="claimInfo" style="color:${item.locationVerified ? "#1B5E20" : "#B54708"};">
${item.locationVerified ? "✅ Location verified" : "⚠️ Location not verified"}${item.distanceM !== null ? " · " + item.distanceM + " m" : ""}${item.lastFacultyId ? " · ID: " + item.lastFacultyId : ""}
</div>

${
!item.assignedTo
?
`
<button class="claimBtn"
onclick="claim('${item.block}')">
Claim
</button>
`
:
`
<div class="claimInfo">
🚗 Claimed by ${item.assignedTo.toUpperCase()}
</div>
`
}

<button class="boarded"
onclick="boarded('${item.block}')">

Boarded

</button>

</div>

`;

document.getElementById("demandList")
.appendChild(row);

});

});

}

function claim(block){

if(!isServiceAvailable()){

document.getElementById("status")
.innerText =

"Buggy service closed for today";

return;

}

if(!currentBuggy) return;

firebase.database()
.ref("requests/"+block)
.update({

assignedTo:currentBuggy

});

document.getElementById("status").innerText=
"📍 Location claimed by " + currentBuggy;

}

function boarded(block){

if(!isServiceAvailable()){

document.getElementById("status")
.innerText =

"Buggy service closed for today";

return;

}

firebase.database()
.ref("requests/"+block)
.remove();

document.getElementById("status").innerText=
"✅ Passengers boarded successfully";

}


window.addEventListener("beforeunload", function () {

if(currentBuggy){

firebase.database()
.ref("drivers/" + normalizeBuggyId(currentBuggy))
.remove();

}

});

/* pagehide is more reliable than beforeunload on mobile / iOS,
   so the driver is removed when the browser is actually closed. */
window.addEventListener("pagehide", function () {

if(currentBuggy){

firebase.database()
.ref("drivers/" + normalizeBuggyId(currentBuggy))
.remove();

}

});


setInterval(function(){

if(!isServiceAvailable()){

logoutDriver();

}

},60000);


window.onpageshow=function(event){

if(event.persisted){

window.location.reload();

}

};

</script>
